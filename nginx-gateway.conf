# VoiceTransl Production Gateway Configuration
# Main nginx reverse proxy for production deployment

upstream voicetransl-api {
    server voicetransl-api:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream voicetransl-ui {
    server voicetransl-ui:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
    
    # Remove server signature
    server_tokens off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Client settings
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    
    # Timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API endpoints
    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Remove /api prefix and proxy to backend
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://voicetransl-api;
        
        # API specific settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_max_temp_file_size 1024m;
        
        # Cors headers for API
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With, X-Request-ID" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With, X-Request-ID";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    # File upload endpoints (stricter rate limiting)
    location ~ ^/api/(upload|files)/ {
        limit_req zone=upload_limit burst=5 nodelay;
        
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://voicetransl-api;
        
        # Special settings for uploads
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_body_timeout 300s;
    }

    # WebSocket connections
    location /ws {
        proxy_pass http://voicetransl-api/ws;
        
        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Disable buffering for WebSockets
        proxy_buffering off;
    }

    # Health check for the entire system
    location /health {
        access_log off;
        
        # Check both services
        location = /health {
            proxy_pass http://voicetransl-ui/health;
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_health;
        }
        
        location @api_health {
            proxy_pass http://voicetransl-api/health;
        }
    }

    # Frontend application (catch-all)
    location / {
        proxy_pass http://voicetransl-ui;
        
        # Frontend specific settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Cache control headers will be set by the frontend nginx
        proxy_set_header Accept-Encoding "";
    }

    # Monitoring endpoints (optional)
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Favicon and robots (prevent 404s)
    location = /favicon.ico {
        proxy_pass http://voicetransl-ui/favicon.ico;
        log_not_found off;
        access_log off;
        expires 7d;
    }

    location = /robots.txt {
        proxy_pass http://voicetransl-ui/robots.txt;
        log_not_found off;
        access_log off;
        expires 7d;
    }

    # Deny access to hidden files and sensitive locations
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common attack patterns
    location ~* \.(php|asp|aspx|jsp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        proxy_pass http://voicetransl-ui/404.html;
        internal;
    }
    
    location = /50x.html {
        proxy_pass http://voicetransl-ui/50x.html;
        internal;
    }
}

# HTTPS server block (for SSL/TLS termination)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozTLS:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (optional)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # All other configuration is the same as HTTP
    include /etc/nginx/conf.d/common.conf;
}

# HTTP to HTTPS redirect (when SSL is enabled)
server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    
    # Allow health checks over HTTP
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Connection upgrade mapping for WebSockets
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Log format for better monitoring
log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '$request_time $upstream_response_time '
                    '$upstream_addr $upstream_status';

access_log /var/log/nginx/access.log main_ext;
error_log /var/log/nginx/error.log warn;